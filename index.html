<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interaktywna prezentacja systemu AI Recepcjonistka dla gabinetów stomatologicznych. Automatyzacja rezerwacji wizyt 24/7, inteligentny SMS, panel zarządzania i raporty." />
    <meta name="keywords" content="AI recepcjonistka, automatyzacja gabinetu, rezerwacja wizyt, gabinet stomatologiczny, AI asystent" />
    <meta name="author" content="AI Recepcjonistka" />
    
    <meta property="og:title" content="AI Recepcjonistka - Interaktywna Prezentacja" />
    <meta property="og:description" content="Zobacz jak AI Recepcjonistka automatyzuje gabinet stomatologiczny 24/7. Inteligentne rezerwacje, SMS, panel zarządzania." />
    <meta property="og:type" content="website" />
    
    <title>AI Recepcjonistka - Interaktywna Prezentacja</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/src/main.css" rel="stylesheet" />
    
    <style>
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, oklch(0.15 0.03 250), oklch(0.20 0.04 270));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease-out;
        }
        
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: oklch(0.45 0.20 250);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <div class="loading-text">Ładowanie prezentacji...</div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen) {
                    loadingScreen.classList.add('hidden');
                    setTimeout(function() {
                        loadingScreen.remove();
                    }, 300);
                }
            }, 500);
        });
    </script>
    
    <noscript>
        <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: oklch(0.15 0.03 250); display: flex; align-items: center; justify-content: center; color: white; font-family: Inter, sans-serif; padding: 20px; text-align: center;">
            <div>
                <h1 style="font-size: 24px; margin-bottom: 16px;">AI Recepcjonistka</h1>
                <p style="font-size: 16px; opacity: 0.8;">Ta interaktywna prezentacja wymaga włączonego JavaScript.<br>Prosimy o włączenie JavaScript w przeglądarce i odświeżenie strony.</p>
            </div>
        </div>
    </noscript>
</body>

</html>
